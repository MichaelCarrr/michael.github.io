<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Box Eatz</title>
    <!-- Google Fonts for elegant typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
    <style>
        /* ----- Reset & Base ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b0b;
            color: #f0ece4;
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ----- Typography ----- */
        .brand-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-style: italic;
            font-size: clamp(2.8rem, 10vw, 5.5rem);
            letter-spacing: -0.02em;
            color: #f0ece4;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .brand-sub {
            font-size: 1.1rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #bfb7a8;
            border-bottom: 2px solid #bfb7a8;
            display: inline-block;
            padding-bottom: 6px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #f0ece4;
            margin-bottom: 1.5rem;
            letter-spacing: -0.01em;
        }

        .section-title span {
            color: #c9a84c;
            font-style: italic;
        }

        /* ----- Header / Hero ----- */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-bottom: 4px solid #c9a84c;
            margin-bottom: 0;
            padding: 0;
            overflow: hidden;
        }

        .hero-slides {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transform: scale(1.1);
            animation: fadeScale 18s linear infinite;
        }

        .slide[aria-hidden="true"] { pointer-events: none; }

        .slide.s1 { animation-delay: 0s; }
        .slide.s2 { animation-delay: 6s; }
        .slide.s3 { animation-delay: 12s; }

        @keyframes fadeScale {
            0% { opacity: 0; transform: scale(1.12); }
            8% { opacity: 1; transform: scale(1.15); }
            33% { opacity: 1; transform: scale(1.2); }
            41% { opacity: 0; transform: scale(1.25); }
            100% { opacity: 0; transform: scale(1.25); }
        }

        .hero-content {
            max-width: 800px;
            position: relative;
            z-index: 2;
            padding: 4rem 1rem;
        }

        .hero .brand-sub {
            margin-bottom: 1rem;
            border-bottom-color: #c9a84c;
        }

        .hero-description {
            font-size: 1.2rem;
            color: #d9d2c5;
            max-width: 600px;
            margin: 1rem auto 2rem;
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        /* ----- Buttons / Links (menu) ----- */
        .menu-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem 2.5rem;
            margin-top: 2rem;
        }

        .menu-link {
            font-size: 1.25rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #f0ece4;
            background: transparent;
            padding: 0.6rem 1.8rem;
            border: 2px solid #c9a84c;
            border-radius: 40px;
            text-decoration: none;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
            background: rgba(11, 11, 11, 0.5);
        }

        .menu-link:hover {
            background: #c9a84c;
            color: #0b0b0b;
            box-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
            transform: scale(1.03);
        }

        /* ----- Food Scroll (reviews) ----- */
        .food-scroll-section {
            padding: 2rem 0 4rem;
        }

        .scroll-wrapper {
            overflow-x: auto;
            padding: 0.5rem 0 1.5rem;
            scrollbar-width: thin;
            scrollbar-color: #c9a84c #1f1f1f;
            -webkit-overflow-scrolling: touch;
        }

        .scroll-wrapper::-webkit-scrollbar {
            height: 8px;
        }
        .scroll-wrapper::-webkit-scrollbar-track {
            background: #1f1f1f;
            border-radius: 10px;
        }
        .scroll-wrapper::-webkit-scrollbar-thumb {
            background: #c9a84c;
            border-radius: 10px;
        }

        .food-grid {
            display: flex;
            gap: 28px;
            width: max-content;
            padding: 0 4px;
        }

        .food-card {
            background: #161616;
            border-radius: 24px;
            padding: 1.2rem 1.2rem 1.8rem;
            width: 270px;
            flex-shrink: 0;
            border: 1px solid #2a2a2a;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        .food-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 30px rgba(0,0,0,0.8);
            border-color: #c9a84c;
        }

        .food-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 1rem;
            background: #2a2a2a;
        }

        .food-card h4 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #f0ece4;
            margin-bottom: 0.25rem;
        }

        .food-card .review {
            font-size: 0.95rem;
            color: #bfb7a8;
            font-style: italic;
            margin: 0.4rem 0 0.2rem;
        }

        .food-card .source {
            font-size: 0.8rem;
            color: #8a8275;
            letter-spacing: 0.02em;
            display: block;
            margin-top: 0.3rem;
        }

        .rating {
            color: #c9a84c;
            letter-spacing: 2px;
            font-size: 1rem;
        }

        /* ----- Footer / CTA ----- */
        .footer-cta {
            text-align: center;
            padding: 3rem 0 4rem;
            border-top: 1px solid #2a2a2a;
            margin-top: 1rem;
        }

        .footer-cta p {
            color: #bfb7a8;
            font-size: 1rem;
        }

        .footer-cta .menu-link {
            display: inline-block;
            margin-top: 1rem;
            background: #c9a84c;
            color: #0b0b0b;
            border-color: #c9a84c;
        }

        .footer-cta .menu-link:hover {
            background: transparent;
            color: #f0ece4;
        }

        /* ----- Responsive ----- */
        @media (max-width: 640px) {
            .hero {
                min-height: 60vh;
                padding: 2.5rem 1rem;
            }
            .hero-description {
                font-size: 1rem;
            }
            .menu-link {
                font-size: 1rem;
                padding: 0.4rem 1.2rem;
            }
            .food-card {
                width: 220px;
            }
        }
    </style>
</head>
<body>
    <!-- HERO / TITLE + IMAGE (background) -->
    <header class="hero">
        <div class="hero-slides" aria-hidden="true">
            <div class="slide s1" style="background-image:url('Images/Food/plate.webp')"></div>
            <div class="slide s2" style="background-image:url('Images/Food/shrimp.webp')"></div>
            <div class="slide s3" style="background-image:url('Images/Food/waffles.webp')"></div>
        </div>

        <div class="hero-content">
            <span class="brand-sub">Welcome to</span>
            <h1 class="brand-title">Black Box Eatz</h1>
            <p class="hero-description">
                Bold flavors · Timeless Vibes
            </p>
            <!-- Menu & Contact -->
            <div class="menu-links">
                <a href="menus.html" class="menu-link" aria-label="Menu">Menu</a>
                <a href="contact.html" class="menu-link" aria-label="Contact Us">Contact Us</a>
            </div>
        </div>
    </header>

    <main class="container">
    </main>
</body>
</html>
